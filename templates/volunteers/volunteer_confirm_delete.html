{% extends 'base.html' %}

{% block title %}Delete Volunteer — NayePankh{% endblock %}

{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4 text-center">

        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 2.5rem;"></i>
        <h5 class="fw-bold mt-3">Delete Volunteer?</h5>
        <p class="text-muted">
          Are you sure you want to delete
          <strong>{{ volunteer.name }}</strong>?
          This action cannot be undone.
        </p>

        <form method="post" class="d-flex gap-2 justify-content-center mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i> Yes, Delete
          </button>
          <a href="{% url 'volunteer_list' %}" class="btn btn-outline-secondary">
            Cancel
          </a>
        </form>

      </div>
    </div>
  </div>
</div>

{% endblock %}
