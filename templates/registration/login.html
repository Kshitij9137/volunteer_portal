{% extends 'base.html' %}

{% block title %}Login — NayePankh{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">

        <div class="text-center mb-4">
          <i class="bi bi-people-fill text-success" style="font-size: 2.5rem;"></i>
          <h4 class="fw-bold mt-2">Welcome Back</h4>
          <p class="text-muted small">Login to manage volunteers</p>
        </div>

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-medium">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus />
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required />
          </div>

          {% if form.errors %}
            <div class="alert alert-danger py-2 small">
              Invalid username or password. Please try again.
            </div>
          {% endif %}

          <button type="submit" class="btn btn-success w-100 mt-2">
            <i class="bi bi-box-arrow-in-right me-1"></i> Login
          </button>
        </form>

        <hr class="my-3"/>
        <p class="text-center small text-muted mb-0">
          Don't have an account?
          <a href="/accounts/signup/" class="text-success fw-medium">Sign up</a>
        </p>

      </div>
    </div>

  </div>
</div>
{% endblock %}
